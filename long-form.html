<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Long Form Videos | Spectre Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#06080e] text-neutral-100 font-sans antialiased min-h-screen flex flex-col justify-between relative overflow-x-hidden bg-[radial-gradient(ellipse_80%_60%_at_50%_-10%,_var(--tw-gradient-stops))] from-[#111927] via-[#06080e] to-[#030407] bg-fixed">

    <!-- Enhanced Floating Ambient Glow Orbs (Recreating depth from image_2.png) -->
    <div class="fixed top-0 left-1/4 w-[500px] h-[500px] bg-indigo-600/10 rounded-full blur-[130px] pointer-events-none z-0"></div>
    <div class="fixed top-20 right-1/4 w-[400px] h-[400px] bg-cyan-500/10 rounded-full blur-[120px] pointer-events-none z-0"></div>
    <div class="fixed bottom-10 right-10 w-96 h-96 bg-cyan-500/10 rounded-full blur-[140px] pointer-events-none z-0"></div>

    <nav class="fixed top-0 left-0 w-full bg-[#06080e]/80 backdrop-blur-md z-50 border-b border-indigo-500/20">
        <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
            <a href="index.html" class="text-xl font-black tracking-wider uppercase text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-indigo-400 to-purple-500">Spectre Studio</a>
            <a href="index.html" class="text-sm font-semibold text-neutral-300 hover:text-cyan-400 transition flex items-center gap-2">
                <i class="fa-solid fa-arrow-left text-xs"></i> Back to Home
            </a>
        </div>
    </nav>

    <main class="max-w-6xl w-full mx-auto px-6 pt-28 pb-20 flex-grow relative z-10">
        <div class="mb-12">
            <span class="text-xs font-black uppercase tracking-widest text-cyan-400 bg-cyan-950/60 border border-cyan-500/30 px-3 py-1 rounded-full shadow-[0_0_10px_rgba(34,211,238,0.2)]">Video Production</span>
            <h1 class="text-4xl md:text-5xl font-black tracking-tight mt-3 mb-3 text-transparent bg-clip-text bg-gradient-to-r from-white via-cyan-100 to-indigo-300">Long Form Videos</h1>
            <p class="text-neutral-400 text-sm max-w-xl">YouTube productions, mini-documentaries, narrative pacing, and corporate video edits.</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <!-- Card 1 -->
            <div class="group bg-[#090c13]/60 border border-indigo-500/20 rounded-2xl overflow-hidden hover:border-cyan-400 hover:shadow-[0_0_25px_rgba(34,211,238,0.25)] transition duration-300 flex flex-col justify-between backdrop-blur-sm">
                <div>
                    <div class="aspect-video bg-black border-b border-indigo-500/20 overflow-hidden relative">
                        <!-- REPLACE WITH YOUR ACTUAL DIRECT VIDEO URL OR THUMBNAIL IF DRIVE URL DOESN'T EMBED DIRECTLY -->
                        <video src="https://lh3.googleusercontent.com/d/1N48k8RarqjVwYhOOraYT11lgWC5PXVC8" autoplay muted loop playsinline class="w-full h-full object-cover"></video>
                        <!-- Top left label overlay like in Image_2 -->
                        <span class="absolute top-3 left-3 text-[10px] font-black uppercase tracking-widest text-cyan-400 bg-cyan-950/80 px-2 py-0.5 rounded shadow">PREVIEW</span>
                    </div>
                    <div class="p-6">
                        <h3 class="font-extrabold text-lg mb-1 text-white group-hover:text-cyan-300 transition">A campus interview portion</h3>
                        <p class="text-neutral-400 text-xs leading-relaxed mb-4">A vlog edit</p>
                    </div>
                </div>
                <div class="px-6 pb-6 flex items-center justify-between border-t border-neutral-800/60 pt-4">
                    <span class="text-[11px] font-mono font-bold bg-indigo-950/80 border border-indigo-500/40 text-indigo-300 px-2.5 py-1 rounded-md shadow-[0_0_10px_rgba(129,140,248,0.15)]">Premiere Pro / DaVinci</span>
                    <a href="https://drive.google.com/file/d/YOUR_GOOGLE_DRIVE_FILE_ID/view?usp=sharing" target="_blank" class="text-xs font-bold text-cyan-400 hover:text-cyan-300 bg-cyan-950/50 hover:bg-cyan-900/60 border border-cyan-500/30 px-3 py-1.5 rounded-lg transition flex items-center gap-1.5 shadow-[0_0_10px_rgba(34,211,238,0.15)]">
                        Watch with Sound <i class="fa-solid fa-arrow-up-right-from-square text-[10px]"></i>
                    </a>
                </div>
            </div>
            
            <!-- You can duplicate the card structure here for more videos -->
        </div>
    </main>

    <footer class="py-6 border-t border-neutral-900/50 text-center text-xs text-neutral-500 relative z-10 bg-[#030407]">
        <p>&copy; 2026 Spectre Studio. All rights reserved.</p>
    </footer>
</body>
</html>
