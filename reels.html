<!DOCTYPE html>

</head>
<body class="bg-neutral-950 text-neutral-100 font-sans antialiased min-h-screen flex flex-col justify-between relative overflow-x-hidden">

    <div class="fixed top-0 right-1/4 w-96 h-96 bg-rose-600/20 rounded-full blur-[130px] pointer-events-none"></div>

    <nav class="fixed top-0 left-0 w-full bg-neutral-950/80 backdrop-blur-md z-50 border-b border-rose-500/20">
        <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
            <a href="index.html" class="text-xl font-black tracking-wider uppercase text-transparent bg-clip-text bg-gradient-to-r from-rose-400 via-fuchsia-400 to-purple-500">Spectre Studio</a>
            <a href="index.html" class="text-sm font-semibold text-neutral-300 hover:text-rose-400 transition flex items-center gap-2">
                <i class="fa-solid fa-arrow-left text-xs"></i> Back to Home

        </div>
    </nav>

    <main class="max-w-6xl w-full mx-auto px-6 pt-28 pb-20 flex-grow relative z-10">
        <div class="mb-12">
            <span class="text-xs font-black uppercase tracking-widest text-rose-400 bg-rose-950/60 border border-rose-500/30 px-3 py-1 rounded-full shadow-[0_0_10px_rgba(244,63,94,0.2)]">Short-Form Content</span>
            <h1 class="text-4xl md:text-5xl font-black tracking-tight mt-3 mb-3 text-transparent bg-clip-text bg-gradient-to-r from-white via-rose-100 to-fuchsia-300">Reels & Shorts</h1>
            <p class="text-neutral-400 text-sm max-w-xl">High-retention vertical edits, rapid-fire transitions, motion captions, and trending content formats.</p>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            <div class="group bg-neutral-900/60 border border-rose-500/20 rounded-2xl overflow-hidden hover:border-rose-400 hover:shadow-[0_0_25px_rgba(244,63,94,0.25)] transition duration-300 flex flex-col justify-between backdrop-blur-sm">
                <div>
                    <div class="aspect-[9/16] bg-neutral-900 border-b border-rose-500/20 overflow-hidden relative">
                        <video src="https://lh3.googleusercontent.com/d/YOUR_GOOGLE_DRIVE_FILE_ID" autoplay muted loop playsinline class="w-full h-full object-cover"></video>
                    </div>
                    <div class="p-4">
                        <h3 class="font-extrabold text-base mb-1 text-white group-hover:text-rose-300 transition">Kinetic Promo Reel</h3>
                        <p class="text-neutral-400 text-xs leading-relaxed mb-2">Fast cuts, kinetic text overlays, and audio sync.</p>
                    </div>
                </div>
                <div class="px-4 pb-4 flex items-center justify-between border-t border-neutral-800/60 pt-3">
                    <span class="text-[10px] font-mono font-bold bg-fuchsia-950/80 border border-fuchsia-500/40 text-fuchsia-300 px-2 py-0.5 rounded">CapCut / AE</span>
                    <a href="https://drive.google.com/file/d/YOUR_GOOGLE_DRIVE_FILE_ID/view?usp=sharing" target="_blank" class="text-xs font-bold text-rose-400 hover:text-rose-300 bg-rose-950/50 hover:bg-rose-900/60 border border-rose-500/30 px-2.5 py-1 rounded-lg transition flex items-center gap-1 shadow-[0_0_10px_rgba(244,63,94,0.15)]">

                    </a>

        </div>
